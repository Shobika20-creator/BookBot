<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookBot AI</title>
    <!-- FontAwesome & Google Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e0e7ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bot-bubble: #ffffff;
            --user-bubble: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        /* ---------------- Sidebar ---------------- */
        .sidebar {
            width: 340px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.04);
            z-index: 10;
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 700;
            background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        
        .brand i {
            -webkit-text-fill-color: var(--primary);
        }

        /* Upload Card inside sidebar */
        .upload-card {
            background: rgba(255, 255, 255, 0.5);
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 32px 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .upload-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .upload-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.1);
        }

        .upload-card:hover::before {
            opacity: 1;
        }

        .upload-card i {
            font-size: 36px;
            color: var(--primary);
            margin-bottom: 16px;
            transition: transform 0.3s;
            position: relative;
        }

        .upload-card:hover i {
            transform: scale(1.1) translateY(-5px);
        }

        .upload-card h4 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            position: relative;
        }

        .upload-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            position: relative;
        }

        #fileInput {
            display: none;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--user-bubble);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 16px -4px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 12px 20px -4px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.7;
            transform: none;
        }

        #uploadLoading {
            display: none;
            background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 0.95rem;
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .doc-info {
            margin-top: auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            line-height: 1.5;
            backdrop-filter: blur(4px);
        }
        .doc-info i { 
            color: var(--primary); 
            font-size: 1.2rem; 
            margin-top: 2px;
        }

        /* ---------------- Main Chat Section ---------------- */
        .main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at top right, rgba(236,72,153,0.05), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(99,102,241,0.05), transparent 40%);
        }

        .chat-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 0 120px 0;
            scroll-behavior: smooth;
        }

        /* Customize scrollbar */
        .chat-area::-webkit-scrollbar {
            width: 8px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.3);
            border-radius: 10px;
        }
        .chat-area::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.5);
        }

        .chat-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .message {
            display: flex;
            gap: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: messageSlideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        
        .avatar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 100%);
        }

        .user .avatar { background: var(--user-bubble); color: white; }
        .bot .avatar { background: white; color: var(--primary); border: 1px solid #e5e7eb; }

        .bubble {
            padding: 18px 24px;
            font-size: 1.05rem;
            line-height: 1.6;
            border-radius: 20px;
            max-width: 80%;
            letter-spacing: 0.2px;
        }
        
        .bubble strong {
            font-weight: 600;
        }

        .user .bubble {
            background: var(--user-bubble);
            color: white;
            border-top-right-radius: 4px;
            box-shadow: 0 8px 16px -4px rgba(99, 102, 241, 0.3);
        }

        .bot .bubble {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 4px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        /* ---------------- Input Section ---------------- */
        .input-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 0 40px 0;
            background: linear-gradient(180deg, transparent, rgba(243,244,246,0.8) 30%, rgba(243,244,246,1) 100%);
            backdrop-filter: blur(4px);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .input-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 8px 12px 8px 28px;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.08), 0 0 0 1px rgba(99,102,241,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
        }

        .input-box:focus-within {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 15px 35px -5px rgba(99,102,241,0.15), 0 0 0 3px rgba(99,102,241,0.1);
            transform: translateY(-2px);
        }

        .input-box input {
            flex-grow: 1;
            border: none;
            outline: none;
            font-size: 1.1rem;
            color: var(--text-main);
            padding: 14px 0;
            background: transparent;
        }

        .input-box input::placeholder {
            color: #9ca3af;
            font-weight: 300;
        }

        .send-btn {
            background: var(--user-bubble);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(99,102,241,0.3);
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.08) rotate(-5deg);
            box-shadow: 0 6px 14px rgba(99,102,241,0.4);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            color: #f1f5f9;
            box-shadow: none;
            transform: none;
        }

        /* Animations */
        @keyframes messageSlideIn {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Typing Dots */
        .typing {
            display: flex;
            gap: 6px;
            padding: 8px 4px;
            align-items: center;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
            opacity: 0.7;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                padding: 20px;
                border-bottom: 1px solid var(--glass-border);
                border-right: none;
                height: auto;
                max-height: 40vh;
                overflow-y: auto;
            }
            .chat-wrapper, .input-wrapper {
                padding: 0 20px;
            }
            .bubble {
                max-width: 90%;
            }
            .brand {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-layer-group"></i> BookBot
        </div>

        <label for="fileInput" class="upload-card" id="uploadCard">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <h4 id="fileTitle">Upload PDF Document</h4>
            <p id="fileDesc">Click to select or drag and drop</p>
        </label>
        <input type="file" id="fileInput" accept=".pdf" onchange="updateFileName()">
        
        <button id="uploadBtn" class="btn-primary" onclick="uploadPDF()" disabled>
            <i class="fa-solid fa-bolt"></i> Process Document
        </button>

        <div id="uploadLoading">
            <i class="fa-solid fa-spinner fa-spin"></i> Analyzing pages...
        </div>

        <div class="doc-info">
            <i class="fa-solid fa-shield-halved"></i>
            <span>All documents are processed securely and locally by your BookBot instance.</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">
        
        <div class="chat-area" id="chat">
            <div class="chat-wrapper" id="chatWrapper">
                <!-- Initial Greeting -->
                <div class="message bot">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bubble">Welcome to BookBot! 👋<br><br>Please use the sidebar to securely upload your PDF document. Once it's processed, you can ask me anything about it and I'll find the answers for you!</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-box">
                    <input type="text" id="question" placeholder="Ask a question about your document..." onkeypress="handleKeyPress(event)" autocomplete="off">
                    <button id="askBtn" class="send-btn" onclick="askQuestion()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        function updateFileName() {
            const input = document.getElementById("fileInput");
            const title = document.getElementById("fileTitle");
            const desc = document.getElementById("fileDesc");
            const btn = document.getElementById("uploadBtn");
            const card = document.getElementById("uploadCard");
            
            if (input.files.length > 0) {
                let name = input.files[0].name;
                title.innerText = "Document Selected";
                desc.innerText = name.length > 30 ? name.substring(0, 30) + '...' : name;
                btn.disabled = false;
                card.style.borderColor = "var(--primary)";
                card.style.background = "rgba(99, 102, 241, 0.05)";
            } else {
                title.innerText = "Upload PDF Document";
                desc.innerText = "Click to select or drag and drop";
                btn.disabled = true;
                card.style.borderColor = "rgba(99, 102, 241, 0.3)";
                card.style.background = "rgba(255, 255, 255, 0.5)";
            }
        }

        async function uploadPDF() {
            const fileInput = document.getElementById("fileInput");
            const uploadBtn = document.getElementById("uploadBtn");
            const loading = document.getElementById("uploadLoading");
            
            if (fileInput.files.length === 0) return;

            uploadBtn.disabled = true;
            loading.style.display = "block";

            let formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                let res = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });
                let data = await res.json();
                
                if (res.ok) {
                    addBotMessage(`**Success!** I've fully analyzed "${fileInput.files[0].name}". What would you like to know about it?`);
                    document.getElementById("fileTitle").innerText = "Processed Successfully";
                    document.getElementById("uploadCard").style.borderColor = "#10b981";
                    document.getElementById("uploadCard").querySelector('i').className = "fa-solid fa-check-circle";
                    document.getElementById("uploadCard").querySelector('i').style.color = "#10b981";
                } else {
                    addBotMessage(`**Error:** ${data.error}`);
                    uploadBtn.disabled = false;
                }
            } catch (err) {
                addBotMessage(`**Connection Error:** Could not upload the file. Please try again.`);
                uploadBtn.disabled = false;
            } finally {
                loading.style.display = "none";
            }
        }

        function addUserMessage(text) {
            const wrapper = document.getElementById("chatWrapper");
            const html = `
                <div class="message user">
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                    <div class="bubble">${escapeHtml(text)}</div>
                </div>
            `;
            wrapper.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function addBotMessage(text) {
            const wrapper = document.getElementById("chatWrapper");
            const temp = document.getElementById("temp-typing");
            if (temp) temp.remove();

            // Bold markdown `**Text**` to `<strong>Text</strong>`, and line breaks.
            let formattedText = escapeHtml(text).replace(/\n/g, '<br>');
            formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            const html = `
                <div class="message bot">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bubble">${formattedText}</div>
                </div>
            `;
            wrapper.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function addTypingIndicator() {
            const wrapper = document.getElementById("chatWrapper");
            const html = `
                <div class="message bot" id="temp-typing">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bubble" style="padding: 12px 24px;">
                        <div class="typing">
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                        </div>
                    </div>
                </div>
            `;
            wrapper.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chatObj = document.getElementById("chat");
            chatObj.scrollTo({
                top: chatObj.scrollHeight,
                behavior: 'smooth'
            });
        }

        async function askQuestion() {
            const input = document.getElementById("question");
            const text = input.value.trim();
            const btn = document.getElementById("askBtn");
            
            if (!text) return;

            input.value = "";
            btn.disabled = true;
            
            addUserMessage(text);
            addTypingIndicator();

            try {
                let res = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: text })
                });

                let data = await res.json();

                if (res.ok) {
                    addBotMessage(data.answer);
                } else {
                    addBotMessage(`**Error:** ${data.error}`);
                }
            } catch (err) {
                addBotMessage(`**Error:** Failed to connect to the server.`);
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        function handleKeyPress(e) {
            if (e.key === "Enter") {
                askQuestion();
            }
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
